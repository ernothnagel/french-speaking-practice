<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Pronunciation Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #e0e7ff; /* Changed to a soft blue theme */
            background-image: radial-gradient(#c7d2fe 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .mic-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mic-btn:active {
            transform: scale(0.90);
        }
        .listening-animation {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* Fireworks animation for success */
        .firework {
            position: absolute;
            animation: shoot 1s cubic-bezier(0.25, 1, 0.5, 1) forwards, fadeOut 0.5s ease-out 1.5s forwards;
            pointer-events: none;
            z-index: 60;
            font-size: 2.5rem;
            transform: translate(-50%, -50%);
        }
        @keyframes shoot {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="mainContainer" class="max-w-xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-100 relative">
        
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNmZmYiLz48L3N2Zz4=')]"></div>
            
            <button onclick="exitGame()" class="absolute top-4 right-4 bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-sm font-bold shadow-md transition-colors z-20">
                Exit
            </button>

            <h1 class="text-3xl font-extrabold relative z-10 tracking-wide mt-2">Parlez Français!</h1>
            <p class="text-blue-100 mt-1 relative z-10 font-semibold text-lg">Pronunciation Practice</p>
            
            <div class="flex justify-between items-center mt-6 relative z-10">
                <div class="bg-blue-700/50 px-4 py-2 rounded-full font-bold shadow-inner flex items-center gap-2">
                    <span>⭐</span> Score: <span id="scoreDisplay">0</span>
                </div>
                <div class="bg-blue-700/50 px-4 py-2 rounded-full font-bold text-sm shadow-inner">
                    Word <span id="currentWordNum">1</span> of <span id="totalWords">10</span>
                </div>
            </div>
        </div>

        <!-- Browser Support Warning (Hidden if supported) -->
        <div id="supportWarning" class="hidden bg-red-100 text-red-700 p-4 text-center font-bold border-b border-red-200">
            ⚠️ Speech Recognition is not supported in this browser. Please use Google Chrome, Edge, or Safari.
        </div>

        <!-- Game Area -->
        <div class="p-6 md:p-8 text-center relative flex flex-col items-center" id="gameArea">
            
            <!-- Translation Hint -->
            <div class="mb-4">
                <span class="uppercase tracking-wider text-sm font-bold text-gray-400">Translation</span>
                <h2 id="hintDisplay" class="text-xl md:text-2xl font-bold text-gray-600 mt-1 capitalize min-h-[32px]">
                    <!-- Hint text goes here -->
                </h2>
            </div>

            <!-- Target Word -->
            <div class="mb-8 w-full">
                <div class="bg-gray-50 rounded-2xl p-6 border-2 border-dashed border-gray-200 relative">
                    <button onclick="playTargetAudio()" class="absolute top-4 right-4 text-blue-500 hover:text-blue-700 transition-colors p-2 bg-blue-100 rounded-full" title="Listen to pronunciation">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M11 19l-7-7H2v-4h2l7-7v20z" />
                        </svg>
                    </button>
                    <h1 id="targetWordDisplay" class="text-4xl md:text-5xl font-extrabold text-gray-800 tracking-wider uppercase">
                        <!-- French Word goes here -->
                    </h1>
                </div>
            </div>

            <!-- Microphone Area -->
            <div class="flex flex-col items-center justify-center mb-8 min-h-[160px]">
                <button id="micButton" onclick="toggleListening()" class="mic-btn w-24 h-24 bg-blue-500 hover:bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg cursor-pointer border-4 border-white outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </button>
                <p id="micStatus" class="mt-4 font-bold text-gray-500 h-6">Tap to speak</p>
                
                <!-- Feedback text showing what the browser heard -->
                <div id="heardContainer" class="mt-4 p-3 bg-gray-100 rounded-lg hidden w-full max-w-sm">
                    <p class="text-sm text-gray-500 font-bold mb-1">We heard:</p>
                    <p id="heardText" class="text-lg font-semibold text-gray-800 italic">...</p>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex justify-center gap-4 w-full">
                <button onclick="skipWord()" class="px-6 py-3 rounded-xl font-bold text-orange-500 bg-orange-50 hover:bg-orange-100 transition-colors shadow-sm w-full md:w-auto">
                    Skip Word
                </button>
            </div>
        </div>

        <!-- Success Modal -->
        <div id="successModal" class="hidden absolute inset-0 bg-white/90 z-50 flex-col items-center justify-center backdrop-blur-sm transition-opacity">
            <div class="relative w-full h-full flex flex-col items-center justify-center">
                <h2 id="successText" class="text-4xl md:text-5xl font-extrabold text-blue-500 drop-shadow-md z-50 scale-110 pop-in mb-4">
                    Parfait !
                </h2>
                <button id="nextBtn" onclick="nextWord()" class="hidden px-8 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold text-xl shadow-md transform transition hover:-translate-y-1 z-50 mt-4">
                    Next Word ➡️
                </button>
            </div>
        </div>

        <!-- Victory Screen -->
        <div id="victoryScreen" class="hidden p-8 text-center flex-col items-center justify-center min-h-[400px]">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-4xl font-extrabold text-gray-800 mb-2">Félicitations!</h2>
            <p class="text-xl text-gray-600 mb-8">Your pronunciation score: <span id="finalScore" class="font-bold text-blue-500"></span></p>
            <button onclick="startGame()" class="px-8 py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold text-xl shadow-lg transform transition hover:-translate-y-1 mb-4 w-full md:w-auto">
                Practice Again
            </button>
            <button onclick="exitGame()" class="px-6 py-2 text-gray-500 hover:text-gray-700 font-bold underline">
                Return to Site
            </button>
        </div>
    </div>

    <script>
        // Vocabulary list
        const fullVocabularyList = [
            { word: "acheter", hint: "to buy" },
            { word: "vendre", hint: "to sell" },
            { word: "ranger", hint: "to pick up / put away" },
            { word: "nettoyer", hint: "to clean" },
            { word: "visiter", hint: "to visit (a place)" },
            { word: "venir", hint: "to come" },
            { word: "aller", hint: "to go" },
            { word: "aider", hint: "to help" },
            { word: "courir", hint: "to run" },
            { word: "rigoler", hint: "to laugh / joke" },
            { word: "cuisiner", hint: "to cook" },
            { word: "ménage", hint: "housework" },
            { word: "bonjour", hint: "hello" },
            { word: "merci", hint: "thank you" },
            { word: "voiture", hint: "car" }
        ];

        const praises = ["Parfait !", "Excellent !", "Très bien !", "Magnifique !"];

        // State Variables
        let gameWords = [];
        let currentWordIndex = 0;
        let score = 0;
        let targetWord = "";
        
        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        // DOM Elements
        const hintDisplay = document.getElementById('hintDisplay');
        const targetWordDisplay = document.getElementById('targetWordDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const currentWordNumDisplay = document.getElementById('currentWordNum');
        const totalWordsDisplay = document.getElementById('totalWords');
        const victoryScreen = document.getElementById('victoryScreen');
        const gameArea = document.getElementById('gameArea');
        const successModal = document.getElementById('successModal');
        const successText = document.getElementById('successText');
        const micButton = document.getElementById('micButton');
        const micStatus = document.getElementById('micStatus');
        const heardContainer = document.getElementById('heardContainer');
        const heardText = document.getElementById('heardText');
        const nextBtn = document.getElementById('nextBtn');

        // Initialize Speech Recognition if supported
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR'; // Set to French!
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                isListening = true;
                micButton.classList.add('bg-red-500');
                micButton.classList.remove('bg-blue-500');
                micButton.classList.add('listening-animation');
                micStatus.textContent = "Listening... Speak now!";
                micStatus.classList.add('text-red-500');
                heardContainer.classList.add('hidden');
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                processSpeechResult(transcript);
            };

            recognition.onerror = function(event) {
                console.error("Speech Recognition Error:", event.error);
                stopListeningState();
                
                if (event.error === 'no-speech') {
                    micStatus.textContent = "Didn't hear anything. Try again.";
                } else if (event.error === 'not-allowed') {
                    micStatus.textContent = "Microphone access denied.";
                } else {
                    micStatus.textContent = "Error: " + event.error;
                }
            };

            recognition.onend = function() {
                stopListeningState();
            };
        } else {
            document.getElementById('supportWarning').classList.remove('hidden');
            micButton.disabled = true;
            micButton.classList.add('opacity-50', 'cursor-not-allowed');
            micStatus.textContent = "Browser not supported.";
        }

        function stopListeningState() {
            isListening = false;
            micButton.classList.remove('bg-red-500');
            micButton.classList.add('bg-blue-500');
            micButton.classList.remove('listening-animation');
            micStatus.classList.remove('text-red-500');
            if (micStatus.textContent.includes("Listening")) {
                micStatus.textContent = "Tap to speak";
            }
        }

        function toggleListening() {
            if (!recognition) return;
            
            if (isListening) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch(e) {
                    console.error("Could not start recognition", e);
                }
            }
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Clean up strings for comparison (removes accents, punctuation, and makes lowercase)
        function normalizeString(str) {
            return str.toLowerCase()
                      .normalize("NFD")
                      .replace(/[\u0300-\u036f]/g, "") // Remove accents
                      .replace(/[.,!?]/g, "")          // Remove punctuation
                      .trim();
        }

        function processSpeechResult(transcript) {
            // Show what the browser heard
            heardText.textContent = `"${transcript}"`;
            heardContainer.classList.remove('hidden');
            heardContainer.classList.add('pop-in');

            const normalizedTranscript = normalizeString(transcript);
            const normalizedTarget = normalizeString(targetWord);

            // Check if what they said matches the target word
            if (normalizedTranscript === normalizedTarget || normalizedTranscript.includes(normalizedTarget)) {
                handleSuccess();
            } else {
                handleFailure();
            }
        }

        function handleSuccess() {
            score += 10;
            updateScore();
            
            const randomPraise = praises[Math.floor(Math.random() * praises.length)];
            successText.textContent = randomPraise;
            
            successModal.classList.remove('hidden');
            successModal.classList.add('flex');
            
            // Wait a second before showing the next button to let them enjoy the fireworks
            nextBtn.classList.add('hidden');
            setTimeout(() => {
                nextBtn.classList.remove('hidden');
            }, 1000);

            // Launch fireworks
            for(let i=0; i<8; i++) {
                setTimeout(createFirework, i * 150);
            }
        }

        function handleFailure() {
            micStatus.textContent = "Not quite! Try again.";
            targetWordDisplay.parentElement.classList.add('shake');
            setTimeout(() => {
                targetWordDisplay.parentElement.classList.remove('shake');
            }, 500);
        }

        // Text-to-speech function for the target word
        function playTargetAudio() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                // Lowercase the word so the browser doesn't treat it as an acronym
                const textToSpeak = targetWord.toLowerCase();
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'fr-FR';
                
                // Force the browser to specifically grab a French voice if it has one installed
                const voices = window.speechSynthesis.getVoices();
                const frenchVoice = voices.find(voice => voice.lang.includes('fr'));
                if (frenchVoice) {
                    utterance.voice = frenchVoice;
                }
                
                utterance.rate = 0.85; // Slightly slower for students
                window.speechSynthesis.speak(utterance);
            }
        }

        function startGame() {
            victoryScreen.classList.add('hidden');
            victoryScreen.classList.remove('flex');
            gameArea.classList.remove('hidden');
            
            // Randomize 10 words for the session
            gameWords = shuffle([...fullVocabularyList]).slice(0, 10);
            currentWordIndex = 0;
            score = 0;
            
            totalWordsDisplay.textContent = gameWords.length;
            updateScore();
            loadWord();
        }

        function loadWord() {
            if (currentWordIndex >= gameWords.length) {
                endGame();
                return;
            }

            const currentItem = gameWords[currentWordIndex];
            targetWord = currentItem.word;
            
            hintDisplay.textContent = currentItem.hint;
            targetWordDisplay.textContent = targetWord;
            currentWordNumDisplay.textContent = currentWordIndex + 1;
            
            // Reset UI
            heardContainer.classList.add('hidden');
            micStatus.textContent = "Tap to speak";
            
            // Automatically play the word to help them
            setTimeout(() => playTargetAudio(), 500);
        }

        function nextWord() {
            successModal.classList.add('hidden');
            successModal.classList.remove('flex');
            currentWordIndex++;
            loadWord();
        }

        function skipWord() {
            if(isListening) recognition.stop();
            currentWordIndex++;
            loadWord();
        }

        function createFirework() {
            const fw = document.createElement('div');
            fw.className = 'firework';
            const emojis = ['🎆', '✨', '🎉', '⭐', '🇫🇷'];
            fw.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            
            const tx = (Math.random() - 0.5) * 400 + 'px';
            const ty = (Math.random() - 0.5) * 400 + 'px';
            fw.style.setProperty('--tx', tx);
            fw.style.setProperty('--ty', ty);
            
            fw.style.left = '50%';
            fw.style.top = '50%';
            
            successModal.querySelector('.relative').appendChild(fw);
            setTimeout(() => fw.remove(), 2000);
        }

        function updateScore() {
            scoreDisplay.textContent = score;
        }

        function endGame() {
            gameArea.classList.add('hidden');
            victoryScreen.classList.remove('hidden');
            victoryScreen.classList.add('flex');
            document.getElementById('finalScore').textContent = score;
        }

        function exitGame() {
            // Replaced alert/confirm with a soft UI exit due to STT requirements
            document.getElementById('mainContainer').innerHTML = `
                <div class="p-10 text-center flex flex-col items-center justify-center min-h-[400px]">
                    <h1 class="text-4xl font-extrabold text-blue-500 mb-4">Au revoir!</h1>
                    <p class="text-gray-600 text-lg mb-8">You have exited the speaking practice.</p>
                    <button onclick="location.reload()" class="px-8 py-4 bg-gray-200 hover:bg-gray-300 rounded-xl font-bold text-gray-700 transition-colors shadow-sm">
                        Restart
                    </button>
                </div>
            `;
        }

        // Initialize on load
        window.onload = startGame;

    </script>
</body>
</html>
